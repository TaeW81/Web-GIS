<script type="text/javascript">
var raster = new ol.layer.Tile({
	source: new ol.source.XYZ({
		url: 'http://api.vworld.kr/req/wmts/1.0.0/CEB52025-E065-364C-9DBA-44880E3B02B8/Base/{z}/{y}/{x}.png'
	})
});

var osm = new ol.layer.Tile({
source: new ol.source.OSM()
});

newProj = ol.proj.get('EPSG:3857');
newProjExtent = newProj.getExtent();

var olView = new ol.View({
  center: ol.proj.transform([127.100616,37.402142], 'EPSG:4326', 'EPSG:3857'),
  zoom: 10,
	  minZoom : 5,
	  maxZoom : 21,
	 projection: newProj,
 extent: newProjExtent || undefined
})

var vmap = new ol.Map({
  layers: [osm,raster],
  target: 'map',
  view: olView
});

/* 폴리곤의 스타일 설정 */
var vectorStyle = function(feature) {
    var style = new ol.style.Style({
	    stroke: new ol.style.Stroke({
	        color: [0, 256, 0, 1],
	        width: 5
	    }),
	    fill: new ol.style.Fill({
	        color: [256, 0, 0, .7]
	    })
    });
    return [style];
}

newProj = ol.proj.get('EPSG:3857');
newProjExtent = newProj.getExtent();        

//대한민국 기준 좌표계는 projection 등록 후 사용 가능

function updateViewProjection(viewProjSelect) {
	var newProj = ol.proj.get(viewProjSelect);
	var newProjExtent;
	var centerc;
	if(viewProjSelect == 'EPSG:2097'){
		var epsg2097 ="+proj=tmerc +lat_0=38 +lon_0=127 +k=1 +x_0=200000 +y_0=500000 +ellps=bessel +units=m +no_defs";
		proj4.defs(viewProjSelect, epsg2097);
		ol.proj.proj4.register(proj4);
		newProj = ol.proj.get(viewProjSelect);
		var fromLonLat = ol.proj.getTransform('EPSG:4326', newProj); //270613.42427841784, 2486372.2503146906
		var extent = [-34700.8915318714, -121359.33614583162, 625361.4060108897, 1074626.2155730922]
		newProj.setExtent(extent);
		newProjExtent = newProj.getExtent();
		//centerc = [224578.25,402963.26]
		centerc = ol.proj.transform([127.100616,37.402142], 'EPSG:4326', 'EPSG:2097');
	}else if(viewProjSelect == 'EPSG:5179'){
		var epsg5179 ="+proj=tmerc +lat_0=38 +lon_0=127.5 +k=0.9996 +x_0=1000000 +y_0=2000000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs";
		proj4.defs(viewProjSelect, epsg5179);
